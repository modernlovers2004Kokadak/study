<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>理容師国家試験 用語集</title>
<link rel="stylesheet" href="style.css">
<style>
:root{--navy:#073d86;--blue:#3477d4;--line:#cbd7e8;--pale:#f5f9fe;--text:#202938;--muted:#647084;--green:#35ba39;--yellow:#ffc400;--red:#ed3434;--gray:#b9c2cf}*{box-sizing:border-box}body{margin:0;background:linear-gradient(110deg,#fff 0%,#f6faff 58%,#eef6ff 100%);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;font-weight:400}.g-nav{position:sticky;top:0;z-index:30;display:grid;grid-template-columns:54px 1fr 54px;align-items:center;height:54px;padding:0 8px;background:var(--navy);color:#fff}.g-nav a{display:grid;place-items:center;height:44px;color:#fff;text-decoration:none;font-size:30px}.g-nav span{text-align:center;font-size:19px}.page{max-width:820px;margin:auto;padding:18px 14px 104px}.page-title{margin:6px 0 20px;text-align:center;color:#0b3978;font-size:25px;font-weight:400}.summary-card{display:grid;grid-template-columns:96px 1fr;gap:14px;align-items:center;padding:18px;border:1px solid var(--line);border-radius:14px;background:#fff}.ring{display:grid;place-items:center;width:88px;height:88px;border-radius:50%;background:conic-gradient(var(--blue) var(--progress),#e7ebf2 0);position:relative}.ring:before{content:'';position:absolute;inset:10px;border-radius:50%;background:#fff}.ring span{position:relative;font-size:21px}.summary-label{font-size:15px}.summary-main{margin:5px 0 8px;font-size:25px}.summary-sub{border-top:1px solid var(--line);padding-top:8px;font-size:13px;color:var(--muted)}.status-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:13px 0 9px}.status-box{padding:12px 4px;border:1px solid var(--line);border-radius:12px;background:#fff;text-align:center;font-size:13px}.status-dot{display:block;width:18px;height:18px;margin:0 auto 7px;border-radius:50%}.status-box em{display:block;margin-top:3px;font-style:normal;font-size:17px}.status-box.safe .status-dot{background:var(--green)}.status-box.caution .status-dot{background:var(--yellow)}.status-box.danger .status-dot{background:var(--red)}.status-box.unlearned .status-dot{background:var(--gray)}.progress-line{height:7px;margin:12px 4px 22px;border-radius:9px;background:#e7ebf2;overflow:hidden}.progress-line i{display:block;height:100%;background:var(--blue)}.section-title{margin:21px 2px 10px;color:#0b3978;font-size:20px;font-weight:400}.mode-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px}.mode-button{display:flex;align-items:center;justify-content:center;gap:9px;min-height:56px;padding:8px;border:1px solid var(--line);border-radius:12px;background:#fff;color:var(--text);font:inherit;font-size:15px}.mode-icon{color:var(--blue);font-size:22px}.minor-modes{display:grid;grid-template-columns:1fr;gap:7px;margin-top:8px}.minor-mode{min-height:40px;padding:6px;border:1px solid var(--line);border-radius:10px;background:#f9fbfe;color:#33445c;font:inherit;font-size:12px}.search-row{display:grid;grid-template-columns:1fr 96px;gap:8px;margin-top:15px}.search-row input{width:100%;min-height:48px;border:1px solid var(--line);border-radius:12px;padding:0 14px;background:#fff;font:inherit}.tag-toggle{border:1px solid var(--line);border-radius:12px;background:#fff;font:inherit}.tag-panel{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px;padding:11px;border:1px solid var(--line);border-radius:12px;background:#fff}.tag-chip{min-height:34px;padding:5px 10px;border:1px solid var(--line);border-radius:999px;background:#fff;font:inherit;font-size:12px}.tag-chip.active{background:var(--navy);border-color:var(--navy);color:#fff}.clear-tags{color:#b32424}.category-list{border:1px solid var(--line);border-radius:12px;overflow:hidden;background:#fff}.category-row{display:grid;grid-template-columns:minmax(0,1fr) auto auto 18px;gap:8px;align-items:center;width:100%;min-height:57px;padding:8px 13px;border:0;border-bottom:1px solid #e5ebf3;background:#fff;text-align:left;font:inherit}.category-row:last-child{border-bottom:0}.category-row .count,.category-row .review{font-size:13px;color:var(--muted)}.category-row .go{font-size:24px}.sticky-start{position:fixed;z-index:25;left:50%;bottom:0;transform:translateX(-50%);width:min(790px,calc(100% - 24px));padding:9px 0 calc(9px + env(safe-area-inset-bottom));background:rgba(255,255,255,.96)}.sticky-start button{width:100%;min-height:54px;border:0;border-radius:8px;background:var(--navy);color:#fff;font:inherit;font-size:20px}.view-head{display:grid;grid-template-columns:42px 1fr 42px;align-items:center;margin-bottom:12px}.view-head button{height:40px;border:1px solid var(--line);border-radius:10px;background:#fff;font:inherit}.view-head h1{margin:0;text-align:center;font-size:19px;font-weight:400}.study-progress{height:7px;margin-bottom:15px;border-radius:6px;background:#e4eaf2;overflow:hidden}.study-progress i{display:block;height:100%;background:var(--blue)}.study-count{text-align:center;color:var(--muted);font-size:13px}.study-card,.term-card,.result-card,.compare-card{margin-top:12px;border:1px solid var(--line);border-radius:14px;background:#fff;overflow:hidden}.term-front{display:grid;place-items:center;min-height:230px;padding:24px;text-align:center}.term-front h2{margin:8px 0;font-size:27px;font-weight:400}.term-category{color:var(--muted);font-size:13px}.tag-line{display:flex;flex-wrap:wrap;justify-content:center;gap:5px;margin-top:11px}.mini-tag{padding:3px 8px;border-radius:999px;background:#eef4fb;color:#436183;font-size:11px}.reveal-button,.next-button{display:block;width:calc(100% - 28px);min-height:50px;margin:0 14px 14px;border:0;border-radius:10px;background:var(--navy);color:#fff;font:inherit;font-size:16px}.term-back{border-top:1px solid var(--line);padding:15px}.term-field{margin-bottom:13px;padding-bottom:13px;border-bottom:1px solid #e7ecf3}.term-label{margin-bottom:5px;color:var(--muted);font-size:12px}.term-value{line-height:1.72}.term-value ul{margin:0;padding-left:1.3em}.exam-points{margin-left:-5px;margin-right:-5px;padding:10px 7px;border:0;border-radius:8px;background:#fff8df}.source-details summary{padding:7px 0;color:var(--muted);font-size:12px;cursor:pointer}.source-content{padding:8px 0;font-size:13px;line-height:1.7}.source-content a{color:var(--navy)}.review-pill{display:inline-block;margin-top:6px;padding:3px 8px;border-radius:999px;background:#fff0cc;color:#765500;font-size:12px}.past-links{margin:12px 0;padding:10px;border-radius:9px;background:#eef6ff}.past-links a{color:var(--navy)}.quiz{margin-top:14px;padding:14px;border-top:1px solid var(--line);background:#f8fbff}.quiz h3{margin:0 0 11px;font-size:16px;font-weight:400;line-height:1.6}.quiz-choice{display:flex;width:100%;min-height:46px;margin:7px 0;padding:10px;border:1px solid var(--line);border-radius:9px;background:#fff;text-align:left;font:inherit;line-height:1.5}.quiz-choice.selected{border-color:var(--blue)}.quiz-choice.correct{border-color:var(--green);background:#effbef}.quiz-choice.wrong{border-color:var(--red);background:#fff1f1}.quiz-submit{width:100%;min-height:46px;margin-top:7px;border:0;border-radius:9px;background:var(--navy);color:#fff;font:inherit}.quiz-result{margin-top:10px;padding:10px;border-radius:9px;background:#fff;line-height:1.6}.assessment{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;padding:14px;border-top:1px solid var(--line)}.assessment button{min-height:48px;border:1px solid var(--line);border-radius:9px;background:#fff;font:inherit;font-size:13px}.assessment button.selected{box-shadow:0 0 0 2px var(--navy)}.next-review{padding:0 14px 12px;text-align:center;color:var(--muted);font-size:12px}.list-tools{display:grid;grid-template-columns:1fr auto;gap:8px;margin-bottom:10px}.list-tools input{min-height:44px;border:1px solid var(--line);border-radius:10px;padding:0 12px}.list-tools button{border:1px solid var(--line);border-radius:10px;background:#fff}.term-card summary{display:grid;grid-template-columns:22px minmax(0,1fr) auto;gap:8px;align-items:center;min-height:56px;padding:0 13px;cursor:pointer;list-style:none}.term-card summary::-webkit-details-marker{display:none}.term-card[open] .arrow{transform:rotate(90deg)}.term-card .term-back{border-top:1px solid var(--line)}.assessment-inline{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:12px}.assessment-inline button{min-height:42px;border:1px solid var(--line);border-radius:8px;background:#fff}.empty{padding:40px 10px;text-align:center;color:var(--muted)}.compare-list{display:grid;gap:10px}.compare-card{padding:14px}.compare-card h2{margin:0 0 10px;font-size:17px;font-weight:400;color:#0b3978}.compare-row{display:grid;grid-template-columns:105px 1fr;gap:8px;padding:8px 0;border-top:1px solid #e7ecf3;line-height:1.5}.result-card{padding:20px;text-align:center}.result-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin:16px 0}.result-grid div{padding:10px;border:1px solid var(--line);border-radius:9px}.due-label{color:#b32424;font-size:11px}.hidden{display:none!important}@media(max-width:440px){.page{padding-left:11px;padding-right:11px}.page-title{font-size:23px}.summary-card{grid-template-columns:82px 1fr;padding:14px}.ring{width:76px;height:76px}.status-grid{gap:5px}.status-box{font-size:12px}.status-box em{font-size:15px}.category-row{grid-template-columns:minmax(0,1fr) auto 18px}.category-row .review{grid-column:1/3;font-size:11px}.minor-modes{grid-template-columns:1fr}.compare-row{grid-template-columns:90px 1fr}}
</style>
<style>
.session-navigation{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 14px 14px}
.session-navigation button{min-height:50px;border:1px solid var(--line);border-radius:10px;background:#fff;color:var(--text);font:inherit;font-size:16px}
.session-navigation .session-next{border-color:var(--navy);background:var(--navy);color:#fff}
.status-box{color:var(--text);font:inherit;cursor:pointer;-webkit-tap-highlight-color:transparent}
.status-box:active{transform:scale(.98);filter:brightness(.98)}
.status-box:focus-visible{outline:3px solid rgba(52,119,212,.35);outline-offset:2px}
.status-message{position:fixed;z-index:60;left:50%;bottom:24px;transform:translateX(-50%);display:flex;align-items:center;gap:14px;width:min(520px,calc(100% - 28px));padding:14px 16px;border:1px solid var(--line);border-radius:12px;background:#fff;box-shadow:0 12px 30px rgba(16,35,63,.18);font-size:14px}
.status-message span{flex:1}.status-message button{width:36px;height:36px;border:1px solid var(--line);border-radius:9px;background:#fff;color:var(--text);font:inherit;font-size:20px}
</style>
