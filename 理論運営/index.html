<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>理論運営_完成版</title><style>
*{box-sizing:border-box}
:root{
  --bg:#f7f7f8;
  --card:#ffffff;
  --ink:#202124;

    --point:#fff8d9;

  --exp:#f3ecff;
  --accent:#5f6368;
}
html{font-size:16px}
body{
  margin:0;
  background:var(--bg);
  color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
  font-size:16px;
  line-height:1.75;

}

}

  cursor:pointer;
  padding:14px 16px;
  font-size:16px;
  font-weight:400;
}

.group>summary,

}
.item>summary{
  border-bottom:1px solid var(--line);
}
.content{
  padding:12px;
}
.block{
  font-size:16px;

  border-radius:14px;
  border:1px solid rgba(0,0,0,.06);

}
.block-label{
  display:none;
  font-size:16px;
  font-weight:400;
  margin:0 0 6px;
  color:var(--accent);
}
.law{background:var(--law)}
.point{background:var(--point); white-space:normal}
.quiz{background:var(--quiz); white-space:normal}
.exp{background:var(--exp); white-space:normal; display:none}
.points{
  margin:0;
  padding-left:1.2em;
}
.points li{margin:3px 0}
.stars{
  display:inline-block;
  font-size:16px;
  font-weight:400;
  color:#5f6368;
  background:#f1f3f4;
  border-radius:999px;
  padding:1px 8px;
  margin-left:6px;
}
.question{margin:0 0 8px}
.choice{
  display:block;
  width:100%;
  text-align:left;
  border:1px solid var(--line);
  background:#fff;
  border-radius:12px;
  padding:11px 12px;
  margin:8px 0;
  font-size:16px;
  font-weight:400;
  color:var(--ink);
  line-height:1.6;
}
.choice.correct{background:#dff3e4;border-color:#188038}
.choice.wrong{background:#fde8e8;border-color:#d93025}
.done{
  font-weight:400;
  font-size:16px;
  display:block;
  margin-top:12px;
}
.done input{
  width:20px;
  height:20px;
  vertical-align:middle;
}
@media(max-width:520px){
  header{padding:16px 14px}
  main{padding:10px}
  summary{padding:13px 14px}

<script>
(function(){
const NS='riyouStudy:v3:';
function pageKey(){return location.pathname.replace(/^\//,'');}
window.studyKey=function(id){return NS+pageKey()+':'+id};
window.studyRead=function(id){try{return JSON.parse(localStorage.getItem(studyKey(id))||'{}')}catch(e){return {}}};
window.studySave=function(id, ok){const r=studyRead(id);r.answered=(r.answered||0)+1;r.correct=(r.correct||0)+(ok?1:0);r.wrong=(r.wrong||0)+(ok?0:1);r.last=Date.now();localStorage.setItem(studyKey(id),JSON.stringify(r));};
window.studyDone=function(id,done){const r=studyRead(id);r.done=!!done;localStorage.setItem(studyKey(id),JSON.stringify(r));};
window.studyBookmark=function(id,on){const r=studyRead(id);r.bookmark=!!on;localStorage.setItem(studyKey(id),JSON.stringify(r));};
window.studyStats=function(ids){let answered=0,correct=0,done=0,wrong=0;ids.forEach(id=>{const r=studyRead(id); if(r.answered){answered++; correct+=(r.correct?1:0); wrong+=(r.wrong?1:0)} if(r.done)done++;}); return {answered,correct,done,wrong,rate:answered?Math.round(correct/answered*100):0,total:ids.length};};
})();
</script>

ance": "★★★☆☆", "original": "リンスやコンディショナーは毛髪表面の感触を整え、トリートメントは毛髪に油分や保湿成分などを補い、損傷毛の感触を整える。", "points": ["表面の感触", "油分・保湿成分", "損傷毛の扱いやすさ"], "question": "リンス・トリートメントの説明として最も適切なものはどれか。", "choices": ["リンスは皮膚疾患を治療するために用いる。", "トリートメントは毛髪の感触を整えるために用いられる。", "どちらも洗浄だけを目的とする。", "どちらもパーマ第2剤と同じ酸化固定剤である。"], "answer": 1, "explain": "洗浄剤、処理剤、薬剤の役割を混同しない。"}, {"title": "パーマ第1剤", "importance": "★★★★★", "original": "パーマ第1剤は還元作用により毛髪内部の結合に作用し、毛髪を変形しやすくする。", "points": ["第1剤", "還元作用", "結合を切る方向"], "question": "パーマ第1剤について正しいものはどれか。", "choices": ["酸化作用により結合を再形成し、形を固定する。", "還元作用により毛髪内部の結合に作用し、変形しやすくする。", "毛髪表面の汚れだけを落とす洗浄剤である。", "染料を酸化重合させて発色させる。"], "answer": 1, "explain": "第1剤は還元。第2剤の酸化と入れ替える問題に注意。"}, {"title": "パーマ第2剤", "importance": "★★★★★", "original": "パーマ第2剤は酸化作用により毛髪内部の結合を再形成し、形を固定する。", "points": ["第2剤", "酸化作用", "結合の再形成"], "question": "パーマ第2剤について誤っているものはどれか。", "choices": ["酸化作用に関係する。", "ウェーブやカールの固定に関係する。", "第1剤の還元作用後に用いられる。", "還元作用により結合を切断することを主目的とする。"], "answer": 3, "explain": "第2剤は酸化。『還元により切断』は第1剤。"}, {"title": "酸化染毛剤", "importance": "★★★★☆", "original": "酸化染毛剤は酸化染料が毛髪内で酸化重合して発色する。かぶれなどの皮膚障害に注意する。", "points": ["酸化重合", "発色", "皮膚障害に注意"], "question": "酸化染毛剤について最も適切なものはどれか。", "choices": ["酸化重合によって発色する。", "毛髪中のメラニンを全く変化させない脱色専用剤である。", "皮膚障害は起こらないため事前確認は不要である。", "一時的に表面へ付くだけで内部反応は一切ない。"], "answer": 0, "explain": "酸化染毛剤は酸化重合が中心。皮膚障害を『起こらない』とする選択肢は誤り。"}, {"title": "脱色剤", "importance": "★★★★☆", "original": "脱色剤は毛髪中のメラニン色素を分解し、毛髪の色を明るくする。", "points": ["メラニン色素", "分解", "明度を上げる"], "question": "脱色剤の説明として正しいものはどれか。", "choices": ["染料を補って暗くするものだけをいう。", "メラニン色素を分解して毛髪を明るくする。", "皮膚に用いて炎症を治療する。", "整髪料と同じく形の保持だけを目的とする。"], "answer": 1, "explain": "染毛と脱色の違いを問う問題。『色を加える』だけでは脱色の説明にならない。"}, {"title": "一時染毛料", "importance": "★★★☆☆", "original": "一時染毛料は毛髪表面に一時的に色を付けるもので、洗髪などにより落ちやすい。", "points": ["一時的", "毛髪表面", "落ちやすい"], "question": "一時染毛料について正しいものはどれか。", "choices": ["毛髪内部で必ず酸化重合して永久的に発色する。", "毛髪表面に一時的に色を付け、洗髪で落ちやすい。", "メラニン色素を完全に分解するためだけに用いる。", "第2剤として結合を再形成する。"], "answer": 1, "explain": "酸化染毛剤・脱色剤・一時染毛料の違いを整理する。"}, {"title": "香粧品の安全確認", "importance": "★★★★☆", "original": "香粧品を用いるときは、使用目的、使用部位、利用者の状態、刺激やアレルギーの可能性を考慮する。", "points": ["使用目的", "使用部位", "アレルギーの可能性"], "question": "薬剤使用前の対応として最も適切なものはどれか。", "choices": ["過去にしみた経験があっても毎回同じ薬剤を通常量で使う。", "使用目的や利用者の状態を確認し、異常があれば無理に施術しない。", "説明すると不安にさせるため薬剤名やリスクは伝えない。", "皮膚に異常があるほど強い薬剤で早く処理する。"], "answer": 1, "explain": "運営管理ともつながる実務問題。安全確認を省略する選択肢は誤り。"}, {"title": "薬剤の保存", "importance": "★★★☆☆", "original": "香粧品や薬剤は、表示、使用期限、保管条件を確認し、変質や混入を防ぐ。", "points": ["表示確認", "使用期限", "変質防止"], "question": "薬剤管理として誤っているものはどれか。", "choices": ["使用期限や表示を確認する。", "容器のふたを閉め、混入を避ける。", "変色・異臭があるものは安易に使用しない。", "残量を節約するため、出した薬剤を元の容器へ戻す。"], "answer": 3, "explain": "出した薬剤を元容器へ戻すと汚染や変質の原因になる。"}, {"title": "整髪料の目的", "importance": "★★★☆☆", "original": "整髪料は毛髪をまとめ、形を保持し、質感や光沢を整えるために用いられる。", "points": ["形の保持", "質感", "光沢"], "question": "整髪料について最も適切なものはどれか。", "choices": ["毛髪の形や質感を整える目的で用いられる。", "毛髪内部の結合を還元する第1剤である。", "皮膚疾患の治療を主目的とする。", "メラニン色素を分解することだけを目的とする。"], "answer": 0, "explain": "整髪料・パーマ剤・脱色剤を混同しない。"}]}, {"title": "第5章　理容技術理論", "items": [{"title": "理容技術の構成", "importance": "★★★★★", "original": "理容技術は、カッティング、シェービング、シャンプー、整髪、薬剤技術などが相互に関連して成り立つ。", "points": ["カッティング", "シェービング", "総合技術"], "question": "理容技術の理解として最も適切なものはどれか。", "choices": ["カッティングだけを学べば他の技術は不要である。", "シェービングは理容の特徴的技術の一つである。", "薬剤技術は衛生や安全と無関係である。", "整髪は施術の結果に影響しない。"], "answer": 1, "explain": "理容技術は単独ではなく総合的に理解する。"}, {"title": "シザーの基本操作", "importance": "★★★★★", "original": "シザーは毛髪を切断する器具であり、刃の開閉、角度、姿勢、コームとの連携が仕上がりと安全に関係する。", "points": ["開閉", "角度", "コームとの連携"], "question": "シザー操作として誤っているものはどれか。", "choices": ["安定した姿勢で操作する。", "コームで毛髪を確認しながら切断する。", "刃の角度や開閉を意識する。", "仕上がりは道具だけで決まり、姿勢は関係しない。"], "answer": 3, "explain": "姿勢・角度・コームとの連携まで問われる。"}, {"title": "コームの役割", "importance": "★★★★☆", "original": "コームは毛髪を整え、引き出し、長さや方向を確認しながら切断を助ける器具である。", "points": ["毛髪を整える", "引き出す", "長さ確認"], "question": "コームの役割として最も適切なものはどれか。", "choices": ["毛髪を引き出し、方向や長さを確認する。", "薬剤を酸化させて形を固定する。", "顔面の毛を剃る刃物として用いる。", "会計記録を管理する器具である。"], "answer": 0, "explain": "器具名と役割を正確に結びつける。"}, {"title": "クリッパーと刈り上げ", "importance": "★★★★☆", "original": "クリッパーは短髪や刈り上げに用いられる電動器具であり、長短のつながりや安全な当て方が重要である。", "points": ["電動器具", "刈り上げ", "自然なつながり"], "question": "クリッパー使用時の注意として最も適切なものはどれか。", "choices": ["皮膚に強く押しつければ常に仕上がりがよくなる。", "長短のつながりと皮膚への当て方に注意する。", "消毒や点検は刃物ではないので不要である。", "濡れた手で電源部を扱うことが基本である。"], "answer": 1, "explain": "電動器具でも安全管理・衛生管理が必要。"}, {"title": "刈り上げのぼかし", "importance": "★★★★☆", "original": "刈り上げでは、短い部分から長い部分へ自然につながるように毛髪を整える。", "points": ["長短差", "自然なつながり", "ぼかし"], "question": "刈り上げの説明として正しいものはどれか。", "choices": ["短い部分と長い部分の境目を不自然に残す技術である。", "長短が自然につながるように整える技術である。", "毛髪を染めるための薬剤技術である。", "頭皮の洗浄だけを目的とする技術である。"], "answer": 1, "explain": "刈り上げは境目を自然につなげる点が重要。"}, {"title": "シェービングの安全", "importance": "★★★★★", "original": "シェービングでは、皮膚を適度に張り、刃の角度、運行方向、力加減に注意して行う。", "points": ["皮膚を張る", "刃の角度", "力加減"], "question": "シェービングで最も適切な対応はどれか。", "choices": ["皮膚を張らず、刃を立てて強く押し当てる。", "皮膚を適度に張り、刃の角度と力加減を調整する。", "出血しても施術を継続し、最後にまとめて処置する。", "顔そりでは利用者の皮膚状態を確認しない。"], "answer": 1, "explain": "皮膚の張り・角度・力加減をセットで問う。"}, {"title": "レザー操作のひっかけ", "importance": "★★★★★", "original": "レザー操作は、刃先の方向、皮膚への角度、運行方向を誤ると皮膚損傷につながる。", "points": ["刃先の方向", "角度", "皮膚損傷防止"], "question": "レザー操作として誤っているものはどれか。", "choices": ["刃の角度を一定に意識する。", "皮膚を適度に緊張させる。", "利用者の皮膚状態を確認する。", "安全のため刃を皮膚に垂直に立てて動かす。"], "answer": 3, "explain": "刃を垂直に立てると危険。もっともらしい『安全のため』に注意。"}, {"title": "シャンプー技術", "importance": "★★★☆☆", "original": "シャンプーは頭皮と毛髪の汚れを落とし、頭皮を清潔に保つ技術である。爪を立てず、適切な力で行う。", "points": ["頭皮・毛髪の清潔", "爪を立てない", "力加減"], "question": "シャンプー技術として適切なものはどれか。", "choices": ["爪を立てて強くこする。", "頭皮状態を見ながら適切な力で洗う。", "毛髪だけを洗い頭皮には触れない。", "薬剤刺激があっても確認せず続ける。"], "answer": 1, "explain": "清潔保持と安全な手技の両方を見る。"}, {"title": "整髪と仕上げ", "importance": "★★★☆☆", "original": "整髪は毛流れ、ボリューム、全体の形を整え、仕上がりを完成させる技術である。", "points": ["毛流れ", "ボリューム", "全体バランス"], "question": "整髪の説明として正しいものはどれか。", "choices": ["毛流れや全体の形を整える仕上げ技術である。", "薬剤を還元させて結合を切断する技術である。", "会計処理の一部である。", "皮膚の消毒だけを目的とする。"], "answer": 0, "explain": "整髪は最後の印象を左右する仕上げ技術。"}, {"title": "器具の衛生と安全", "importance": "★★★★★", "original": "刃物、電動器具、薬剤を扱う理容技術では、使用前後の点検、清掃、消毒、安全確認が必要である。", "points": ["点検", "清掃・消毒", "安全確認"], "question": "器具管理として誤っているものはどれか。", "choices": ["使用前後に状態を確認する。", "刃物は清掃・消毒を行う。", "電動器具も安全点検が必要である。", "同じ利用者なら次回まで清掃せず保管してよい。"], "answer": 3, "explain": "『同じ利用者』でも衛生管理を省略できない。"}, {"title": "施術中の異常時対応", "importance": "★★★★☆", "original": "施術中に出血、強い痛み、薬剤刺激などの異常があれば、施術を中止又は調整し、状態を確認する。", "points": ["異常時は確認", "無理に続けない", "安全優先"], "question": "施術中に利用者が強い刺激を訴えた場合の対応として最も適切なものはどれか。", "choices": ["予定時間を守るため最後まで続ける。", "利用者の状態を確認し、必要に応じて中止又は処置する。", "刺激は当然なので説明せず続ける。", "記録を残さないため口頭だけで済ませる。"], "answer": 1, "explain": "安全優先。運営管理の苦情・説明ともつながる。"}, {"title": "技術とカウンセリング", "importance": "★★★★☆", "original": "施術前には希望、髪質、頭皮状態、過去の施術歴などを確認し、技術選択に反映する。", "points": ["希望確認", "髪質・頭皮状態", "施術歴"], "question": "施術前確認として最も適切なものはどれか。", "choices": ["利用者の希望だけを聞き、頭皮状態は見ない。", "髪質や頭皮状態、過去の施術歴を確認する。", "過去に薬剤トラブルがあっても確認不要である。", "説明は施術後に初めて行う。"], "answer": 1, "explain": "技術問題でも、確認・説明を絡めたケース問題が出る。"}]}, {"title": "第6章　運営管理", "items": [{"title": "運営管理の目的", "importance": "★★★★☆", "original": "運営管理は、サービス、衛生、安全、経営を適切に管理し、利用者に安心できるサービスを提供するために行う。", "points": ["サービス", "衛生・安全", "継続的な経営"], "question": "運営管理の考え方として最も適切なものはどれか。", "choices": ["利益が出れば衛生や安全の管理は不要である。", "利用者の安心とサービス品質、衛生、安全、経営を総合的に管理する。", "価格を統一することだけを目的とする。", "技術者個人の経験だけに任せ、記録は残さない。"], "answer": 1, "explain": "運営管理は利益だけでなく安全・衛生・説明・記録まで含む。"}, {"title": "接客と要望確認", "importance": "★★★★☆", "original": "接客では、利用者を迎え、要望を聞き、施術内容を説明し、満足につながる対応を行う。", "points": ["要望確認", "施術説明", "満足"], "question": "接客として最も適切なものはどれか。", "choices": ["希望を確認せず、技術者の判断だけで施術を決める。", "要望を聞き、できることと注意点を説明する。", "料金は終了後に初めて知らせる。", "苦情を避けるため説明はしない。"], "answer": 1, "explain": "要望確認と説明はセット。料金・リスクの後出しは避ける。"}, {"title": "接遇の基本", "importance": "★★★☆☆", "original": "接遇は、言葉遣い、態度、身だしなみ、表情などにより、相手に配慮した対応を行うことである。", "points": ["言葉遣い", "態度", "身だしなみ"], "question": "接遇として誤っているものはどれか。", "choices": ["清潔な身だしなみに配慮する。", "相手に応じた言葉遣いを心がける。", "不安がある利用者には説明を加える。", "常連客には乱暴な言葉遣いでも問題ない。"], "answer": 3, "explain": "常連であっても基本的な接遇は必要。"}, {"title": "説明責任", "importance": "★★★★☆", "original": "施術内容、料金、所要時間、薬剤使用やリスクなどは、利用者が理解できるように説明する。", "points": ["施術内容", "料金", "リスク説明"], "question": "説明として最も適切なものはどれか。", "choices": ["薬剤の刺激や注意点は不安を与えるため一切伝えない。", "料金や所要時間は施術後に知らせればよい。", "施術前に内容、料金、注意点を分かりやすく伝える。", "専門用語だけで説明し、理解確認は不要である。"], "answer": 2, "explain": "事前説明が基本。専門用語の羅列は『説明したつもり』になりやすい。"}, {"title": "苦情対応", "importance": "★★★★★", "original": "苦情があった場合は、事実確認、傾聴、記録、説明、再発防止を行い、感情的な対応や責任転嫁を避ける。", "points": ["事実確認", "傾聴", "再発防止"], "question": "苦情対応として最も適切なものはどれか。", "choices": ["相手の話を遮り、店側の正当性だけを説明する。", "事実を確認し、相手の話を聴き、必要な説明と再発防止につなげる。", "店に不利な内容は記録しない。", "苦情はすべて利用者の誤解として処理する。"], "answer": 1, "explain": "傾聴・事実確認・記録・再発防止を一連で覚える。"}, {"title": "安全管理と事故予防", "importance": "★★★★☆", "original": "理容所では、転倒、出血、薬剤トラブル、感染などを防ぐため、環境整備と確認を行う。", "points": ["転倒防止", "出血対応", "薬剤トラブル防止"], "question": "安全管理として誤っているものはどれか。", "choices": ["床の濡れや器具の配置に注意する。", "刃物や薬剤の扱いを確認する。", "事故が起きた場合は内容を記録する。", "小さな出血なら利用者に説明せず隠す。"], "answer": 3, "explain": "小さな事故でも説明・記録・再発防止が重要。"}, {"title": "個人情報管理", "importance": "★★★★☆", "original": "氏名、住所、連絡先、健康状態、施術履歴などの個人情報は、目的に沿って適切に管理する。", "points": ["氏名・連絡先", "健康状態", "施術履歴"], "question": "個人情報の扱いとして最も適切なものはどれか。", "choices": ["施術履歴を誰でも見られる場所に置く。", "目的に沿って必要な範囲で管理し、不要な共有を避ける。", "常連客の情報なら自由に第三者へ話してよい。", "健康状態は施術に関係する場合でも記録してはならない。"], "answer": 1, "explain": "施術上必要な情報も、目的に沿って適切に管理する。"}, {"title": "会計と収支", "importance": "★★★☆☆", "original": "売上、経費、利益を把握し、継続して運営できるように管理する。利益は売上から経費を差し引いて考える。", "points": ["売上", "経費", "利益"], "question": "会計管理として正しいものはどれか。", "choices": ["売上が多ければ経費は確認しなくてよい。", "利益は売上から経費を差し引いて考える。", "現金だけを扱えば記録は不要である。", "赤字でも客数が多ければ経営上の問題はない。"], "answer": 1, "explain": "売上と利益の混同がひっかけ。"}, {"title": "予約管理", "importance": "★★★☆☆", "original": "予約管理では、施術時間、担当者、利用者の希望、待ち時間を考慮し、無理な重複を避ける。", "points": ["施術時間", "担当者", "待ち時間"], "question": "予約管理として最も適切なものはどれか。", "choices": ["売上を増やすため同じ時間に無制限に予約を入れる。", "施術時間と担当者の状況を考え、無理な重複を避ける。", "常連客以外の予約は記録しない。", "遅れが出ても利用者へ説明しない。"], "answer": 1, "explain": "予約は利益だけでなく信頼・安全・品質に関係する。"}, {"title": "衛生と経営判断", "importance": "★★★★☆", "original": "経営上の効率を考える場合でも、衛生と安全を犠牲にしてはならない。", "points": ["効率", "衛生優先", "安全優先"], "question": "経営判断として最も適切なものはどれか。", "choices": ["時間短縮のため器具消毒を省略する。", "衛生・安全を確保したうえで効率化を考える。", "利用者が気づかなければ薬剤説明を省略する。", "利益確保のため事故記録を残さない。"], "answer": 1, "explain": "効率化と省略を混同しない。"}]}, {"title": "第7章　文化論", "items": [{"title": "文化論の視点", "importance": "★★★☆☆", "original": "文化論では、髪型や理容の歴史、社会背景、時代ごとの美意識を学ぶ。", "points": ["髪型", "歴史", "美意識"], "question": "文化論の学習として最も適切なものはどれか。", "choices": ["髪型を時代や社会背景と関連づけて理解する。", "技術とは無関係なので国家試験では一切不要である。", "流行は個人の好みだけで社会とは関係しない。", "文化論は薬剤の酸化還元だけを扱う。"], "answer": 0, "explain": "文化論は時代背景・社会制度・美意識と髪型を結びつける。"}, {"title": "髪型と社会背景", "importance": "★★★☆☆", "original": "髪型は、時代、身分、職業、宗教、流行、衛生観などの影響を受けて変化する。", "points": ["時代", "身分・職業", "衛生観"], "question": "髪型の変化について正しいものはどれか。", "choices": ["髪型は常に技術者の都合だけで決まる。", "時代や身分、職業、流行などの影響を受ける。", "衛生観の変化は髪型に影響しない。", "宗教や社会制度とは全く関係しない。"], "answer": 1, "explain": "髪型を社会から切り離す選択肢は誤り。"}, {"title": "日本の髪型", "importance": "★★★☆☆", "original": "日本では、時代ごとに髷、日本髪、断髪などの髪型が発展し、社会制度や生活様式の影響を受けた。", "points": ["髷", "日本髪", "断髪"], "question": "日本の髪型について最も適切なものはどれか。", "choices": ["髷や日本髪、断髪は時代背景と関連して理解する。", "日本の髪型は近代以降に初めて生まれた。", "断髪は古代から全く変化なく続いた髪型である。", "社会制度や生活様式は髪型に影響しない。"], "answer": 0, "explain": "髪型名だけでなく時代背景との関連が問われる。"}, {"title": "西洋の髪型", "importance": "★★★☆☆", "original": "西洋の髪型は、古代から近代にかけて、身分、宗教、軍隊、流行、職業などの影響を受けて変化した。", "points": ["身分", "宗教", "軍隊・職業"], "question": "西洋の髪型の理解として正しいものはどれか。", "choices": ["身分や宗教、職業などの影響を受けて変化した。", "東洋の髪型と完全に同じ発展をした。", "衛生や社会制度とは無関係に固定されていた。", "理容文化とは関係しない。"], "answer": 0, "explain": "西洋の髪型も社会背景と関連づける。"}, {"title": "近現代の流行", "importance": "★★★☆☆", "original": "近現代の髪型は、映画、音楽、スポーツ、メディア、生活様式などの影響を受けて広がった。", "points": ["映画", "音楽", "メディア"], "question": "近現代の流行について最も適切なものはどれか。", "choices": ["映画や音楽、メディアの影響を受けることがある。", "社会に広がることはなく個人内で完結する。", "生活様式の変化とは無関係である。", "理容技術の発展とは常に切り離される。"], "answer": 0, "explain": "流行はメディアや生活様式との関係で問われやすい。"}, {"title": "理容文化の意義", "importance": "★★★☆☆", "original": "理容文化は、清潔、美しさ、社会性、個人の表現と関わり、時代の価値観を反映する。", "points": ["清潔", "美しさ", "個人の表現"], "question": "理容文化の意義として誤っているものはどれか。", "choices": ["清潔や美しさと関係する。", "社会性や個人の表現と関係する。", "時代の価値観を反映することがある。", "公衆衛生や生活文化とは全く関係しない。"], "answer": 3, "explain": "理容文化は公衆衛生・生活文化・美意識とも関係する。"}]}, {"title": "応用難問追加", "items": [{"title": "酸化還元の総合問題", "importance": "★★★★★", "original": "パーマ剤、酸化染毛剤、脱色剤は、いずれも薬剤の働きを区別して理解する必要がある。", "points": ["パーマ第1剤は還元", "第2剤は酸化", "染毛・脱色の区別"], "question": "薬剤の働きの組合せとして正しいものはどれか。", "choices": ["パーマ第1剤－酸化固定、パーマ第2剤－還元切断", "パーマ第1剤－還元、パーマ第2剤－酸化", "脱色剤－毛髪表面に一時着色、整髪料－メラニン分解", "酸化染毛剤－洗浄、シャンプー剤－酸化重合"], "answer": 1, "explain": "第1剤と第2剤の入れ替え、染毛と脱色の混同が典型的なひっかけ。"}, {"title": "施術前確認の総合問題", "importance": "★★★★★", "original": "薬剤施術やシェービングでは、利用者の状態、過去のトラブル、希望、施術リスクを確認する。", "points": ["利用者状態", "過去のトラブル", "説明"], "question": "施術前の対応として最も適切なものはどれか。", "choices": ["過去に薬剤でかぶれた経験がある利用者にも、通常どおり説明なしで施術する。", "希望だけを聞き、頭皮や皮膚状態は確認しない。", "状態と希望を確認し、必要な説明をして無理な施術を避ける。", "施術時間を短縮するため説明と記録は省略する。"], "answer": 2, "explain": "技術・薬剤・運営管理を横断したケース問題。安全確認を省く選択肢は誤り。"}, {"title": "苦情と安全管理の総合問題", "importance": "★★★★☆", "original": "施術後に皮膚トラブルや仕上がりへの不満があった場合は、事実確認、記録、説明、再発防止が必要である。", "points": ["事実確認", "記録", "再発防止"], "question": "施術後の苦情対応として最も適切なものはどれか。", "choices": ["苦情は店の評価を下げるので記録しない。", "利用者の話を聴き、事実確認と記録を行い、再発防止を検討する。", "常連客でなければ対応しない。", "技術者の経験上問題ないと判断すれば説明不要である。"], "answer": 1, "explain": "苦情対応は感情的に処理せず、確認・記録・再発防止に結びつける。"}, {"title": "文化と実務の総合問題", "importance": "★★★★☆", "original": "髪型は流行や社会背景の影響を受けるが、実際の施術では利用者の希望、髪質、生活様式、安全を考慮する。", "points": ["流行", "生活様式", "安全"], "question": "流行を取り入れた施術として最も適切なものはどれか。", "choices": ["流行していれば利用者の髪質や生活様式を考慮しない。", "利用者の希望、髪質、生活様式を確認したうえで提案する。", "流行の髪型は説明なしで施術する。", "安全性より見た目だけを優先する。"], "answer": 1, "explain": "文化論と接客・技術判断を結びつける問題。"}]}]}];
const PAGE_ID="理論運営/index.html";
window.studyKey=function(id){return 'riyouStudy:v3:'+PAGE_ID+':'+id};
const app=document.getElementById('app');
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function allItems(){let a=[]; if(Array.isArray(DATA)){DATA.forEach(ch=>(ch.groups||[]).forEach(g=>(g.items||[]).forEach(it=>a.push(it))))}else{(DATA.groups||[]).forEach(g=>(g.items||[]).forEach(it=>a.push(it)))} return a;}
function qid(it,idx){return 'q'+idx}
function render(){const ids=allItems().map((_,i)=>qid(_,i));app.innerHTML=`<section class="toolbar"><button onclick="openAll()">すべて開く</button><button onclick="closeAll()">すべて閉じる</button><button class="wrong-random" onclick="showWrongRandom()">間違えた問題をランダムに表示</button><button onclick="resetMarks()">学習記録を消す</button></section><div id="randomBox"></div>`+(Array.isArray(DATA)?DATA.map(ch=>`<details class="chapter" open><summary>${esc(ch.title)}</summary><div class="content">${(ch.groups||[]).map(g=>`<details class="group" open><summary>${esc(g.title)}<span class="count">${g.items.length}問</span></summary><div class="content">${g.items.map((it)=>itemHtml(it,allItems().indexOf(it))).join('')}</div></details>`).join('')}</div></details>`).join(''):(DATA.groups||[]).map(g=>`<details class="group" open><summary>${esc(g.title)}<span class="count">${g.items.length}問</span></summary><div class="content">${g.items.map((it)=>itemHtml(it,allItems().indexOf(it))).join('')}</div></details>`).join(''));bindChecks();}
function itemHtml(it,idx){const id=qid(it,idx), r=studyRead(id), checked=r.done?'checked':'', bm=r.bookmark?' on':'';const title=it.no?`${esc(it.no)}　${esc(it.topic)}`:esc(it.title);const lv=it.level||it.importance||''; const extra=it.original?`<section class="block law">${esc(it.original)}</section><section class="block point"><ul class="points">${(it.points||[]).map(p=>`<li>${esc(p)}</li>`).join('')}</ul></section>`:''; const exp=it.original?`<section class="block exp">答え：${it.answer+1}<br>${esc(it.explain)}</section>`:`<details class="answerbox"><summary>正解を表示</summary><div>正解：${it.answer+1}</div></details><details class="expbox"><summary>解説を表示</summary><div>${esc(it.explain)}<br><br>この問題で覚えること：${esc(it.memory||'')}<br>ひっかけポイント：${esc(it.trap||'')}</div></details>`;return `<details class="item" data-qid="${id}"><summary>${title}<span class="stars">${esc(lv)}</span></summary><div class="content">${extra}<section class="block quiz"><p class="question">${esc(it.question)}</p>${it.choices.map((c,i)=>`<button class="choice" onclick="answer(this,${i},${it.answer},'${id}')">${i+1}　${esc(c)}</button>`).join('')}</section>${exp}<button class="bookmark${bm}" data-bookmark="${id}" onclick="toggleBookmark(this,'${id}')">${r.bookmark?'★ ブックマーク済み':'☆ ブックマーク'}</button><label class="done"><input type="checkbox" data-id="${id}" ${checked}> 学習済み</label></div></details>`;}
function answer(btn,val,ans,id){const ok=val===ans;const q=btn.closest('.quiz');q.querySelectorAll('.choice').forEach((b,i)=>{b.classList.remove('correct','wrong','selected');if(i===ans)b.classList.add('correct');});btn.classList.add('selected');if(!ok)btn.classList.add('wrong');studySave(id,ok);const c=btn.closest('.content');const exp=c.querySelector('.exp');if(exp)exp.style.display='block';const ab=c.querySelector('.answerbox');if(ab)ab.open=true;const eb=c.querySelector('.expbox');if(eb)eb.open=true;updatePageStats();}
function toggleBookmark(btn,id){const on=!btn.classList.contains('on');btn.classList.toggle('on',on);btn.textContent=on?'★ ブックマーク済み':'☆ ブックマーク';studyBookmark(id,on);}
function bindChecks(){document.querySelectorAll('input[data-id]').forEach(ch=>{ch.onchange=()=>{studyDone(ch.dataset.id,ch.checked);updatePageStats();};});}
function updatePageStats(){}
function showWrongRandom(){const items=allItems().map((it,i)=>({it,idx:i,id:qid(it,i),r:studyRead(qid(it,i))})).filter(x=>(x.r.wrong||0)>0);const box=document.getElementById('randomBox');if(!items.length){box.innerHTML='<section class="wrong-empty">間違えた問題はまだありません。</section>';return;}const pick=items[Math.floor(Math.random()*items.length)];box.innerHTML='<details class="item" open><summary>間違えた問題からランダム表示</summary><div class="content">'+itemHtml(pick.it,pick.idx)+'</div></details>';}
function openAll(){document.querySelectorAll('details').forEach(d=>d.open=true)}
function closeAll(){document.querySelectorAll('details.item').forEach(d=>d.open=false)}
function resetMarks(){if(confirm('学習記録を消しますか')){Object.keys(localStorage).filter(k=>k.startsWith('riyouStudy:v3:'+PAGE_ID+':')).forEach(k=>localStorage.removeItem(k));render();}}
render();
