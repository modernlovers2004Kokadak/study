const QS=[{"page":"過去問第1弾/chapter1.html","pageKey":"過去問第1弾/chapter1.html","qid":"q0","title":"問題1　理容師法の目的","topic":"理容師法の目的","question":"次のうち、最も適切なものはどれか。","choices":["理容師法の目的では、記録・確認・区分などの手順は試験上ほとんど問われない。","理容師法の目的では、清潔物と使用済み物を同じ場所に戻しても、見た目が整っていればよい。","理容師法の目的については、客の希望があれば法令・衛生管理上の制限をすべて省略できる。","目的は理容師の資格と業務の適正化を通じて公衆衛生の向上に資すること。"],"answer":3,"explain":"理容師法の目的は、国家試験で問われやすい基本事項です。正解は「目的は理容師の資格と業務の適正化を通じて公衆衛生の向上に資すること。」という考え方に合う選択肢です。選択肢では「常に」「すべて」「だけでよい」などの断定表現に注意します。","memory":"目的は理容師の資格と業務の適正化を通じて公衆衛生の向上に資すること。"},{"page":"過去問第1弾/chapter1.html","pageKey":"過去問第1弾/chapter1.html","qid":"q1","title":"問題2　理容師と理容所","topic":"理容師と理容所","question":"国家試験対策として正しい理解はどれか。","choices":["理容師と理容所は、理容師本人ではなく客だけが判断すれば足りる。","理容師は理容を業とする者、理容所は理容の業を行う施設。","理容師と理容所では、清潔物と使用済み物を同じ場所に戻しても、見た目が整っていればよい。","理容師と理容所では、異常や違反があっても、結果的に事故がなければ問題にならない。"],"answer":1,"explain":"理容師と理容所は、国家試験で問われやすい基本事項です。正解は「理容師は理容を業とする者、理容所は理容の業を行う施設。」という考え方に合う選択肢です。選択肢では「常に」「すべて」「だけでよい」などの断定表現に注意します。","memory":"理容師は理容を業とする者、理容所は理容の業を行う施設。"},{"page":"過去問第1弾/chapter1.html","pageKey":"過去問第1弾/chapter1.html","qid":"q2","title":"問題3　無免許業務の禁止","topic":"無免許業務の禁止","question":"このテーマで押さえるべき内容として正しいものはどれか。","choices":["無免許業務の禁止は、衛生や安全よりも営業上の都合を常に優先する考え方である。","無免許業務の禁止では、異常や違反があっても、結果的に事故がなければ問題にならない。","無免許業務の禁止では、清潔物と使用済み物を同じ場所に戻しても、見た目が整っていればよい。","理容師でなければ理容を業としてはならない。"],"answer":3,"explain":"無免許業務の禁止は、国家試験で問われやすい基本事項です。正解は「理容師でなければ理容を業としてはならない。」という考え方に合う選択肢です。選択肢では「常に」「すべて」「だけでよい」などの断定表現に注意します。","memory":"理容師でなければ理容を業としてはならない。"},{"page":"過去問第1弾/chapter1.html","pageKey":"過去問第1弾/chapter1.html","qid":"q3","title":"問題4　理容師の衛生措置","topic":"理容師の衛生措置","question":"頻出事項の整理として最も適切なものはどれか。","choices":["理容師の衛生措置は、衛生や安全よりも営業上の都合を常に優先する考え方である。","皮膚に接する布片は客ごとに取り替え、器具は客ごとに消毒する。","理容師の衛生措置では、異常や違反があっても、結果的に事故がなければ問題にならない。","理容師の衛生措置では、皮膚に接する布片は客ごとに取り替えだけを覚えれば足り、ほかの条件は無視してよい。"],"answer":1,"explain":"理容師の衛生措置は、国家試験で問われやすい基本事項です。正解は「皮膚に接する布片は客ごとに取り替え、器具は客ごとに消毒する。」という考え方に合う選択肢です。選択肢では「常に」「すべて」「だけでよい」などの断定表現に注意します。","memory":"皮膚に接する布片は客ごとに取り替え、器具は客ごとに消毒する。"},{"page":"過去問第1弾/chapter1.html","pageKey":"過去問第1弾/chapter1.html","qid":"q4","title":"問題5　検査確認","topic":"検査確認","question":"用語の理解として誤っているものはどれか。","choices":["構造設備が基準に適合する確認を受けた後でなければ使用できない。","検査確認では、届出と検査確認は別。","検査確認は、確認・区分・衛生配慮を組み合わせて判断する。","検査確認は、理容師本人ではなく客だけが判断すれば足りる。"],"answer":3,"explain":"検査確認は、国家試験で問われやすい基本事項です。正解は「構造設備が基準に適合する確認を受けた後でなければ使用できない。」という考え方に合う選択肢です。選択肢では「常に」「すべて」「だけでよい」などの断定表現に注意します。","memory":"構造設備が基準に適合する確認を受けた後でなければ使用できない。"},{"page":"過去問第1弾/chapter1.html","pageKey":"過去問第1弾/chapter1.html","qid":"q5","title":"問題6　管理理容師の要件","topic":"管理理容師の要件","question":"次の記述のうち、誤っているものはどれか。","choices":["管理理容師の要件は、確認・区分・衛生配慮を組み合わせて判断する。","管理理容師の要件は、理容師本人ではなく客だけが判断すれば足りる。","免許後三年以上の実務経験と指定講習修了が必要。","管理理容師の要件では、「免許前」の経験は原則含めない。"],"answer":1,"explain":"管理理容師の要件は、国家試験で問われやすい基本事項です。正解は「免許後三年以上の実務経験と指定講習修了が必要。」という考え方に合う選択肢です。選択肢では「常に」「すべて」「だけでよい」などの断定表現に注意します。","memory":"免許後三年以上の実務経験と指定講習修了が必要。"},{"page":"過去問第1弾/chapter1.html","pageKey":"過去問第1弾/chapter1.html","qid":"q6","title":"問題7　立入検査","topic":"立入検査","question":"実務上の判断として最も不適切なものはどれか。","choices":["行政は必要に応じて報告徴収や立入検査を行うことがある。","立入検査では、拒否や虚偽報告は不適切。","立入検査は、確認・区分・衛生配慮を組み合わせて判断する。","立入検査では、行政は必要に応じて報告徴収や立入検査を行うことがあるだけを覚えれば足り、ほかの条件は無視してよい。"],"answer":3,"explain":"立入検査は、国家試験で問われやすい基本事項です。正解は「行政は必要に応じて報告徴収や立入検査を行うことがある。」という考え方に合う選択肢です。選択肢では「常に」「すべて」「だけでよい」などの断定表現に注意します。","memory":"行政は必要に応じて報告徴収や立入検査を行うことがある。"},{"page":"過去問第1弾/chapter1.html","pageKey":"過去問第1弾/chapter1.html","qid":"q7","title":"問題8　変更届・廃止届","topic":"変更届・廃止届","question":"ひっかけ問題として、誤りを含むものはどれか。","choices":["変更届・廃止届は、確認・区分・衛生配慮を組み合わせて判断する。","変更届・廃止届では、異常や違反があっても、結果的に事故がなければ問題にならない。","届出事項の変更や廃止には所定の届出が必要。","変更届・廃止届では、開設時だけで終わらない。"],"answer":1,"explain":"変更届・廃止届は、国家試験で問われやすい基本事項です。正解は「届出事項の変更や廃止には所定の届出が必要。」という考え方に合う選択肢です。選択肢では「常に」「すべて」「だけでよい」などの断定表現に注意します。","memory":"届出事項の変更や廃止には所定の届出が必要。"},{"page":"過去問第1弾/chapter2.html","pageKey":"過去問第1弾/chapter2.html","qid":"q0","title":"問題1　消毒の目的","topic":"消毒の目的","question":"次のうち、最も適切なものはどれか。","choices":["消毒の目的では、病 function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function key(q){return 'riyouStudy:v3:'+q.pageKey+':'+q.qid}
function render(){const box=document.getElementById('list');const hits=QS.filter(q=>{try{return JSON.parse(localStorage.getItem(key(q))||'{}').bookmark}catch(e){return false}});if(!hits.length){box.innerHTML='<div class="empty">ブックマークした問題はまだありません。</div>';return;}box.innerHTML=hits.map(q=>`<div class="item"><div class="title">${esc(q.title)}</div><div class="muted">${esc(q.page)}</div><div class="actions"><a class="btn" href="${q.page}">問題ページを開く</a><button class="btn" onclick="removeBm('${esc(q.pageKey)}','${q.qid}')">解除</button></div></div>`).join('')}
function removeBm(pageKey,qid){const k='riyouStudy:v3:'+pageKey+':'+qid;let r={};try{r=JSON.parse(localStorage.getItem(k)||'{}')}catch(e){}r.bookmark=false;localStorage.setItem(k,JSON.stringify(r));render();}
render();
