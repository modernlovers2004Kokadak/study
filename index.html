<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>理容師国家試験</title>
<meta name="theme-color" content="#eaf5ff">
<meta name="apple-mobile-web-app-title" content="国家試験">
<meta name="application-name" content="国家試験">
<link rel="manifest" href="manifest.webmanifest">
<link rel="stylesheet" href="style.css">
</head>
<body>
<main class="app-shell">
  <header class="hero-top">
    <div class="title-banner">
      <span class="brand-mark"><svg viewBox="0 0 64 64" aria-hidden="true"><path d="M12 16c8-4 15-3 20 2v32c-5-5-12-6-20-2V16z"/><path d="M52 16c-8-4-15-3-20 2v32c5-5 12-6 20-2V16z"/></svg></span>
      <span class="hero-title">理容師国家試験対策</span>
    </div>
  </header>

  <section class="content">
    <section class="hero-card" id="hero-card"></section>

    <section class="quick-grid">
      <a class="quick q1" href="過去問/index.html"><span class="quick-icon"><svg viewBox="0 0 64 64" aria-hidden="true"><path d="M12 16c8-4 15-3 20 2v32c-5-5-12-6-20-2V16z"/><path d="M52 16c-8-4-15-3-20 2v32c5-5 12-6 20-2V16z"/></svg></span><span>今日の学習</span><small>18問</small></a>
      <a class="quick q2" href="過去問/index.html#review"><span class="quick-icon"><svg viewBox="0 0 64 64" aria-hidden="true"><path d="M48 24a18 18 0 0 0-30-8l-5 5" fill="none" stroke="currentColor" stroke-width="6" stroke-linecap="round"/><path d="M13 11v10h10" fill="none" stroke="currentColor" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/><path d="M16 40a18 18 0 0 0 30 8l5-5" fill="none" stroke="currentColor" stroke-width="6" stroke-linecap="round"/><path d="M51 53V43H41" fill="none" stroke="currentColor" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span>今日の復習</span><small id="due-mini">0問</small></a>
      <a class="quick q3" href="過去問/index.html#mistakes"><span class="quick-icon"><svg viewBox="0 0 64 64" aria-hidden="true"><path d="M20 10h24a4 4 0 0 1 4 4v42L32 46 16 56V14a4 4 0 0 1 4-4z"/><path d="M34 18l3 6 7 1-5 5 1 7-6-3-6 3 1-7-5-5 7-1 3-6z" opacity=".35"/></svg></span><span>間違い復習</span><small id="mistake-mini">0問</small></a>
      <a class="quick q4" href="過去問/index.html#mock"><span class="quick-icon"><svg viewBox="0 0 64 64" aria-hidden="true"><path d="M22 12h20v10a10 10 0 0 1-20 0V12z" fill="none" stroke="currentColor" stroke-width="6"/><path d="M22 18H12v5a12 12 0 0 0 12 12M42 18h10v5a12 12 0 0 1-12 12" fill="none" stroke="currentColor" stroke-width="6" stroke-linecap="round"/><path d="M32 32v12M24 52h16M20 56h24" fill="none" stroke="currentColor" stroke-width="6" stroke-linecap="round"/><path d="M32 17l2 4 4 .6-3 3 .7 4.4-3.7-2-3.7 2 .7-4.4-3-3 4-.6 2-4z"/></svg></span><span>模試</span><small>55問</small></a>
    </section>

    <section class="entry-grid">
      <a class="entry-card study" href="教材/index.html"><span class="entry-ico"><svg viewBox="0 0 64 64" aria-hidden="true"><path d="M10 16c9-5 17-4 22 2v34c-5-6-13-7-22-2V16z"/><path d="M54 16c-9-5-17-4-22 2v34c5-6 13-7 22-2V16z"/></svg></span><span class="entry-text"><span>教材集</span><small>条文・解説を読む</small></span><span class="arrow">›</span></a>
      <a class="entry-card quiz" href="過去問/index.html"><span class="entry-ico"><svg viewBox="0 0 64 64" aria-hidden="true"><path d="M20 10h24a5 5 0 0 1 5 5v39a5 5 0 0 1-5 5H20a5 5 0 0 1-5-5V15a5 5 0 0 1 5-5z"/><path d="M24 22h16M24 33h16M24 44h10" fill="none" stroke="#ff9a36" stroke-width="5" stroke-linecap="round"/></svg></span><span class="entry-text"><span>問題集</span><small>過去問で演習する</small></span><span class="arrow">›</span></a>
    </section>

    <section class="progress-card" id="progress-card"></section>
    <section class="category-card-list" id="category-card-list"></section>
    <section class="weak-card" id="weak-card"></section>
  </section>
</main>

<script src="過去問/data.js"></script>
<script>
const PREFIX='riyo_v05_';
const store={get:k=>JSON.parse(localStorage.getItem(PREFIX+k)||'null')};
function baseProg(){return{done:{},history:[],mistakes:{},themeStats:{},catStats:{},daily:{},recentIds:[],recentThemes:[],settings:{todayCount:21,recentBlock:30,masterNeed:2}}}
function prog(){return {...baseProg(),...(store.get('prog')||{})}}
function pct(n,d){return d?Math.round(n/d*100):0}
function today(){return new Date().toISOString().slice(0,10)}
function lastNDays(n){const a=[];for(let i=0;i<n;i++){const d=new Date();d.setDate(d.getDate()-i);a.push(d.toISOString().slice(0,10))}return a}
function catQuestions(id){return QUESTIONS.filter(q=>q.category===id)}
function rankCounts(list){return {
  ss:list.filter(q=>q.importance>=5).length,
  s:list.filter(q=>q.importance===4).length,
  a:list.filter(q=>q.importance<=3).length
}}
function weaknessName(key){
  const gid=String(key||'').split(':')[0];
  const c=CATEGORIES.find(x=>x.id===gid);
  return c ? c.name : '苦手テーマ';
}
function weaknessRows(p){
  const rows=Object.entries(p.themeStats||{}).map(([k,s])=>{
    const total=(s.ok||0)+(s.ng||0);
    return {name:weaknessName(k), total, rate:pct(s.ok||0,total), ng:s.ng||0};
  }).filter(x=>x.total>0 && x.ng>0)
    .sort((a,b)=>(b.ng-a.ng)||(a.rate-b.rate))
    .slice(0,3);
  return rows;
}
function renderProgress(){
  const p=prog();
  const done=Object.keys(p.done||{}).length;
  const h=p.history||[];
  const ok=h.filter(x=>x.ok).length;
  const wrong=Object.values(p.mistakes||{}).filter(m=>!m.mastered).length;
  const due=Object.values(p.mistakes||{}).filter(m=>!m.mastered && (!m.nextReview || m.nextReview<=today())).length;
  const week=lastNDays(7).reduce((a,d)=>a+(p.daily?.[d]?.try||0),0);
  const total=QUESTIONS.length;
  const donePct=pct(done,total);
  const correctPct=pct(ok,h.length);
  const target=Math.ceil(total*.8);
  const remain=Math.max(0,target-done);
  const mastered=Object.values(p.mistakes||{}).filter(m=>m.mastered).length;
  const masterPct=pct(mastered,total);
  document.getElementById('due-mini').textContent=due+'問';
  document.getElementById('mistake-mini').textContent=wrong+'問';
  document.getElementById('hero-card').innerHTML=`
    <div class="ring big" style="--p:${donePct}"><span>${donePct}%</span><small>完了率</small></div>
    <div class="hero-info">
      <h2>今日の学習状況</h2>
      <p>あと <span>${remain}問</span> で合格圏に到達します</p>
      <div class="bar"><i style="width:${donePct}%"></i></div>
      <div class="hero-numbers"><div>学習済み<br><span>${done}問</span></div><div>全体<br><span>${total}問</span></div></div>
    </div>`;
  document.getElementById('progress-card').innerHTML=`
    <div class="progress-bars">
      <div class="progress-bar-item"><div class="progress-bar-label"><span>問題進捗</span><em>${done} / ${total}</em></div><div class="progress-track"><i class="bar-blue" style="width:${donePct}%"></i></div></div>
      <div class="progress-bar-item"><div class="progress-bar-label"><span>完全克服</span><em>${mastered} / ${total}</em></div><div class="progress-track"><i class="bar-green" style="width:${masterPct}%"></i></div></div>
      <div class="progress-bar-item"><div class="progress-bar-label"><span>正答率</span><em>${correctPct}%</em></div><div class="progress-track"><i class="bar-orange" style="width:${correctPct}%"></i></div></div>
    </div>`;
  const palette=['#4f46e5','#4f46e5','#4f46e5','#4f46e5','#4f46e5','#4f46e5','#4f46e5','#06b6d4','#06b6d4','#ec4899','#a855f7','#22c55e','#eab308','#a47764','#36537f'];
  document.getElementById('category-card-list').innerHTML=CATEGORIES.map((c,i)=>{
    return `<a class="category-card-row category-quiz-row" href="過去問/index.html#cat=${encodeURIComponent(c.id)}" aria-label="${c.name}の問題">
      <span class="cat-num" style="background:${palette[i]||'#4f46e5'}">${i+1}</span>
      <span class="cat-body"><span class="cat-title">${c.name}</span></span>
      <span class="cat-action">問題 ›</span>
    </a>`
  }).join('');
  const wr=weaknessRows(p);
  document.getElementById('weak-card').innerHTML=`
    <div class="section-head"><h2><span class="flame">◆</span>苦手ランキング</h2><a href="過去問/index.html#mistakes">すべて見る ›</a></div>
    ${wr.length ? `<div class="weak-list">${wr.map((w,i)=>`<a class="weak-row" href="過去問/index.html#mistakes"><span class="rank r${i+1}">${i+1}</span><span>${w.name}</span><small>正答率 <em>${w.rate}%</em></small><span class="go">›</span></a>`).join('')}</div>` : `<div class="empty-weak">まだ苦手データがありません</div>`}`;
}
function renderCategories(){}
renderProgress();
renderCategories();
if ('serviceWorker' in navigator) {
  window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));
}
</script>
</body>
</html>
