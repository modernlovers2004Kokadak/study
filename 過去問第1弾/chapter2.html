<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>第2章　衛生管理</title>
<style>
*{box-sizing:border-box}:root{--bg:#faf9f6;--card:#fff;--ink:#171923;--muted:#555b66;--line:#e8e1f8;--quiz:#eefbf2;--ans:#eef6ff;--exp:#f6efff;--memo:#fff8df;--accent:#5b3cc4;--shadow:0 6px 18px rgba(32,24,72,.09)}html{font-size:16px}body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;font-size:16px;line-height:1.75;padding-bottom:24px;font-weight:400}header{background:linear-gradient(135deg,#6748d8,#4c32b4);color:#fff;padding:18px 16px;text-align:center}h1{font-size:18px;line-height:1.45;margin:0;font-weight:400;letter-spacing:.03em}main{max-width:860px;margin:0 auto;padding:14px 12px}.topnav{display:grid;gap:12px;margin:14px 0}.topnav a{display:block;background:#fff;border:1.5px solid #d9cff5;border-radius:16px;padding:15px 16px;text-decoration:none;color:var(--ink);box-shadow:var(--shadow);font-weight:400}.topnav a:nth-child(1){background:linear-gradient(90deg,#fbf9ff,#fff);border-color:#bbaaf0}.topnav a:nth-child(2){background:linear-gradient(90deg,#f3fff7,#fff);border-color:#9dd9b6}.topnav a:nth-child(3){background:linear-gradient(90deg,#fff9e8,#fff);border-color:#f2c452}.topnav a:nth-child(4){background:linear-gradient(90deg,#f2f7ff,#fff);border-color:#9bc0ff}.topnav a:nth-child(5){background:linear-gradient(90deg,#fff3f7,#fff);border-color:#f3a2be}.topnav a:nth-child(6){background:linear-gradient(90deg,#effdff,#fff);border-color:#8dd6de}.topnav a:nth-child(7){background:linear-gradient(90deg,#fff5eb,#fff);border-color:#ffbf83}.note{background:#fff;border:1.5px solid #d9cff5;border-radius:16px;padding:14px;margin:12px 0;box-shadow:var(--shadow)}.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0 12px}.toolbar button{border:1px solid #d9cff5;background:#fff;border-radius:999px;padding:8px 12px;font-size:15px;color:var(--ink)}details{background:var(--card);border:1.5px solid #e5def8;border-radius:16px;margin:10px 0;overflow:hidden;box-shadow:var(--shadow)}summary{list-style:none;cursor:pointer;padding:14px 16px;font-size:16px;font-weight:400}summary::-webkit-details-marker{display:none}.group>summary,.item>summary{background:#fff}.item>summary{border-bottom:1px solid var(--line)}.content{padding:12px}.block{font-size:16px;font-weight:400;line-height:1.75;margin:10px 0;padding:13px 14px;border-radius:14px;border:1px solid rgba(0,0,0,.06);white-space:normal}.quiz{background:var(--quiz)}.question{margin:0 0 8px}.choice{display:block;width:100%;text-align:left;border:1px solid #d9dde8;background:#fff;border-radius:12px;padding:11px 12px;margin:8px 0;font-size:16px;font-weight:400;color:var(--ink);line-height:1.6}.choice.correct{background:#dff3e4;border-color:#188038}.choice.wrong{background:#fde8e8;border-color:#d93025}.answerbox,.expbox{border:1px solid rgba(0,0,0,.06);border-radius:14px;margin:10px 0}.answerbox{background:var(--ans)}.expbox{background:var(--exp)}.answerbox summary,.expbox summary{padding:12px 14px}.answerbox div,.expbox div{padding:0 14px 14px;white-space:pre-wrap}.done{font-weight:400;font-size:16px;display:block;margin-top:12px}.done input{width:20px;height:20px;vertical-align:middle}.stars,.count{display:inline-block;font-size:16px;font-weight:400;color:#5f6368;background:#f1f3f4;border-radius:999px;padding:1px 8px;margin-left:6px}.nav-back{max-width:860px;margin:10px auto 0;padding:0 12px}.nav-back a{display:inline-block;border:1px solid #d9cff5;background:#fff;border-radius:999px;padding:8px 14px;text-decoration:none;color:#4c32b4;font-size:15px;font-weight:400;box-shadow:var(--shadow)}.nav-back a:before{content:"← "}@media(max-width:520px){header{padding:16px 14px}main{padding:10px}summary{padding:13px 14px}.content{padding:10px}.block{padding:12px;margin:9px 0;border-radius:13px}.choice{padding:11px 10px}.toolbar button{flex:1 1 auto}.topnav a{padding:14px}}
.bookmark{border:1px solid #d9cff5;background:#fff;border-radius:999px;padding:7px 10px;margin:10px 0;font-size:15px;color:#4c32b4}.bookmark.on{background:#fff8df;border-color:#e8c75f;color:#8a6500}

<script>
(function(){
const NS='riyouStudy:v3:';
function pageKey(){return location.pathname.replace(/^\//,'');}
window.studyKey=function(id){return NS+pageKey()+':'+id};
window.studyRead=function(id){try{return JSON.parse(localStorage.getItem(studyKey(id))||'{}')}catch(e){return {}}};
window.studySave=function(id, ok){const r=studyRead(id);r.answered=(r.answered||0)+1;r.correct=(r.correct||0)+(ok?1:0);r.wrong=(r.wrong||0)+(ok?0:1);r.last=Date.now();localStorage.setItem(studyKey(id),JSON.stringify(r));};
window.studyDone=function(id,done){const r=studyRead(id);r.done=!!done;localStorage.setItem(studyKey(id),JSON.stringify(r));};
window.studyBookmark=function(id,on){const r=studyRead(id);r.bookmark=!!on;localStorage.setItem(studyKey(id),JSON.stringify(r));};
window.studyStats=function(ids){let answered=0,correct=0,done=0,wrong=0;ids.forEach(id=>{const r=studyRead(id); if(r.answered){answered++; correct+=(r.correct?1:0); wrong+=(r.wrong?1:0)} if(r.done)done++;}); return {answered,correct,done,wrong,rate:answered?Math.round(correct/answered*100):0,total:ids.length};};
})();
</script>
</head><body><header><h1>第2章　衛生管理<br>完成版・難度強化問題集</h1></header><nav class="nav-back"><a href="index.html">章一覧に戻る</a></nav><main id="app"></main>
<script>const DATA={"title":"第2章　衛生管理　完成版・難度強化問題","groups":[{"title":"国家試験対策・難度強化問題","items":[{"id":"2-1","no":"問題1","topic":"消毒の基本","level":"★★★★★ 難","question":"器具の衛生管理について最も適切なものはどれか。","choices":["血液が付着していない器具は、複数客に連続使用してよい。","使用後の器具は、洗浄してから適切な方法で消毒する。","消毒薬に浸せば、目に見える汚れの除去は不要である。","同じ家族に使用する場合は、消毒を省略できる。"],"answer":1,"explain":"消毒は洗浄と組み合わせて行う。使用後の器具をそのまま消毒薬に入れる考え方は不十分。","memory":"洗浄と消毒の順序を押さえる。","trap":"家族や常連客でも省略しない。"},{"id":"2-2","no":"問題2","topic":"血液付着時","level":"★★★★★ 難","question":"血液が付着した器具の取扱いとして最も適切なものはどれか。","choices":["通常より短時間の消毒でよい。","流水で見た目を流せば、消毒は不要である。","血液を介した感染リスクを考慮し、適切な高水準の消毒を行う。","乾燥させれば病原体は直ちに失活するため、そのまま再使用できる。"],"answer":2,"explain":"血液付着時は感染リスクが高く、確実な処理が必要である。","memory":"血液付着の有無で扱いが変わる点が頻出。","trap":"「見た目がきれい」は安全の根拠にならない。"},{"id":"2-3","no":"問題3","topic":"手指衛生","level":"★★★★★ 難","question":"手指衛生について正しいものはどれか。","choices":["手袋を着用すれば、作業前後の手指衛生は不要である。","施術前後や汚染のおそれがある時は、手指を清潔に保つ。","同一客への施術中であれば、汚染後も手指衛生は不要である。","アルコールを一度使えば、その日の手洗いは不要である。"],"answer":1,"explain":"手袋は手指衛生の代わりではない。場面に応じて手洗い・消毒を行う。","memory":"手袋万能の誤答に注意。","trap":"同一客でも汚染場面では対応が必要。"},{"id":"2-4","no":"問題4","topic":"布片の交換","level":"★★★★★ 難","question":"布片の取扱いとして正しいものはどれか。","choices":["皮膚に接する布片は、客ごとに取り替える。","汚れが見えなければ、同じ布片を一日使用できる。","首に巻く布片は、乾燥していれば交換不要である。","出張理容では、布片の交換基準は緩和される。"],"answer":0,"explain":"皮膚に接する布片は客ごとに取り替える。","memory":"「見た目が清潔なら可」という誤答に注意。","trap":"出張理容でも衛生基準は軽視できない。"},{"id":"2-5","no":"問題5","topic":"清潔物と汚染物","level":"★★★★★ 難","question":"清潔な器具と使用済み器具の管理として最も適切なものはどれか。","choices":["作業効率を優先し、同じ容器でまとめて管理する。","清潔なものと使用済みのものを区分して管理する。","消毒予定の器具は、清潔器具の上に仮置きしてもよい。","使用済み器具は乾燥していれば清潔物と同じ扱いでよい。"],"answer":1,"explain":"交差汚染を防ぐため、清潔物と使用済み物は区分する。","memory":"区分管理は実務ケース問題で問われやすい。","trap":"乾燥と清潔は同義ではない。"},{"id":"2-6","no":"問題6","topic":"感染症分類","level":"★★★★★ 難","question":"感染症法の分類について正しいものはどれか。","choices":["一類感染症には、エボラ出血熱、痘そう、ペストなどが含まれる。","五類感染症は、すべて就業制限の対象となる最重症の分類である。","三類感染症には、インフルエンザと麻しんが含まれる。","二類感染症には、コレラと腸チフスが含まれる。"],"answer":0,"explain":"一類感染症にはエボラ出血熱、クリミア・コンゴ出血熱、痘そう、ペストなどがある。","memory":"分類の入れ替えが典型的なひっかけ。","trap":"コレラ・腸チフスは三類。"},{"id":"2-7","no":"問題7","topic":"結核","level":"★★★★★ 難","question":"結核の分類として正しいものはどれか。","choices":["一類感染症。","二類感染症。","三類感染症。","四類感染症。"],"answer":1,"explain":"結核は二類感染症である。","memory":"結核は出題頻度が高い。","trap":"三類の腸管系感染症と混同しない。"},{"id":"2-8","no":"問題8","topic":"消毒薬の誤用","level":"★★★★★ 難","question":"消毒薬の使い方として誤っているものはどれか。","choices":["濃度や接触時間を守る。","対象物に応じて方法を選ぶ。","濃度を濃くすれば、どの器具にも安全に使える。","汚れを落としてから消毒する。"],"answer":2,"explain":"消毒薬は濃ければよいわけではなく、対象物・濃度・時間を守る必要がある。","memory":"濃度万能の誤答に注意。","trap":"器具を傷める、人体に有害などのリスクもある。"},{"id":"2-9","no":"問題9","topic":"保健所の役割","level":"★★★★★ 難","question":"保健所の役割として最も適切なものはどれか。","choices":["地域保健に関する指導、相談、衛生に関する業務を行う。","理容料金を決定し、全国一律に統制する。","理容師試験の合否を個別に決定する。","消費者契約のすべてを無効にする権限を持つ。"],"answer":0,"explain":"保健所は地域保健や環境衛生に関する企画、調整、指導等を担う。","memory":"保健所の衛生行政上の役割を押さえる。","trap":"料金決定や試験合否とは別。"},{"id":"2-10","no":"問題10","topic":"出張理容の衛生","level":"★★★★★ 難","question":"出張理容の衛生管理として最も適切なものはどれか。","choices":["作業場所は、採光・照明・換気や衛生保持に配慮する。","利用者宅では理容所より衛生管理を簡略化してよい。","携行品は最小限でよく、消毒済み器具の区分は不要である。","不特定多数が出入りする場所でも、区分された作業場所は不要である。"],"answer":0,"explain":"出張理容でも作業環境、携行品、消毒、健康管理などの衛生確保が求められる。","memory":"出張だから基準が緩いわけではない。","trap":"作業環境と携行品の管理が問われやすい。"}]}]};
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function allItems(){let a=[]; if(Array.isArray(DATA)){DATA.forEach(ch=>(ch.groups||[]).forEach(g=>(g.items||[]).forEach(it=>a.push(it))))}else{(DATA.groups||[]).forEach(g=>(g.items||[]).forEach(it=>a.push(it)))} return a;}
function qid(it,idx){return 'q'+idx}
function render(){const ids=allItems().map((_,i)=>qid(_,i));app.innerHTML=`<section class="toolbar"><button onclick="openAll()">すべて開く</button><button onclick="closeAll()">すべて閉じる</button><button class="wrong-random" onclick="showWrongRandom()">間違えた問題をランダムに表示</button><button onclick="resetMarks()">学習記録を消す</button></section><div id="randomBox"></div>`+(Array.isArray(DATA)?DATA.map(ch=>`<details class="chapter" open><summary>${esc(ch.title)}</summary><div class="content">${(ch.groups||[]).map(g=>`<details class="group" open><summary>${esc(g.title)}<span class="count">${g.items.length}問</span></summary><div class="content">${g.items.map((it)=>itemHtml(it,allItems().indexOf(it))).join('')}</div></details>`).join('')}</div></details>`).join(''):(DATA.groups||[]).map(g=>`<details class="group" open><summary>${esc(g.title)}<span class="count">${g.items.length}問</span></summary><div class="content">${g.items.map((it)=>itemHtml(it,allItems().indexOf(it))).join('')}</div></details>`).join(''));bindChecks();}
function itemHtml(it,idx){const id=qid(it,idx), r=studyRead(id), checked=r.done?'checked':'', bm=r.bookmark?' on':'';const title=it.no?`${esc(it.no)}　${esc(it.topic)}`:esc(it.title);const lv=it.level||it.importance||''; const extra=it.original?`<section class="block law">${esc(it.original)}</section><section class="block easy">${esc(it.plain)}</section><section class="block point"><ul class="points">${(it.points||[]).map(p=>`<li>${esc(p)}</li>`).join('')}</ul></section>`:''; const exp=it.original?`<section class="block exp">答え：${it.answer+1}<br>${esc(it.explain)}</section>`:`<details class="answerbox"><summary>正解を表示</summary><div>正解：${it.answer+1}</div></details><details class="expbox"><summary>解説を表示</summary><div>${esc(it.explain)}<br><br>この問題で覚えること：${esc(it.memory||'')}<br>ひっかけポイント：${esc(it.trap||'')}</div></details>`;return `<details class="item" data-qid="${id}"><summary>${title}<span class="stars">${esc(lv)}</span></summary><div class="content">${extra}<section class="block quiz"><p class="question">${esc(it.question)}</p>${it.choices.map((c,i)=>`<button class="choice" onclick="answer(this,${i},${it.answer},'${id}')">${i+1}　${esc(c)}</button>`).join('')}</section>${exp}<button class="bookmark${bm}" data-bookmark="${id}" onclick="toggleBookmark(this,'${id}')">${r.bookmark?'★ ブックマーク済み':'☆ ブックマーク'}</button><label class="done"><input type="checkbox" data-id="${id}" ${checked}> 学習済み</label></div></details>`;}
function answer(btn,val,ans,id){const ok=val===ans;const q=btn.closest('.quiz');q.querySelectorAll('.choice').forEach((b,i)=>{b.classList.remove('correct','wrong','selected');if(i===ans)b.classList.add('correct');});btn.classList.add('selected');if(!ok)btn.classList.add('wrong');studySave(id,ok);const c=btn.closest('.content');const exp=c.querySelector('.exp');if(exp)exp.style.display='block';const ab=c.querySelector('.answerbox');if(ab)ab.open=true;const eb=c.querySelector('.expbox');if(eb)eb.open=true;updatePageStats();}
function toggleBookmark(btn,id){const on=!btn.classList.contains('on');btn.classList.toggle('on',on);btn.textContent=on?'★ ブックマーク済み':'☆ ブックマーク';studyBookmark(id,on);}
function bindChecks(){document.querySelectorAll('input[data-id]').forEach(ch=>{ch.onchange=()=>{studyDone(ch.dataset.id,ch.checked);updatePageStats();};});}
function updatePageStats(){}
function showWrongRandom(){const items=allItems().map((it,i)=>({it,idx:i,id:qid(it,i),r:studyRead(qid(it,i))})).filter(x=>(x.r.wrong||0)>0);const box=document.getElementById('randomBox');if(!items.length){box.innerHTML='<section class="wrong-empty">間違えた問題はまだありません。</section>';return;}const pick=items[Math.floor(Math.random()*items.length)];box.innerHTML='<details class="item" open><summary>間違えた問題からランダム表示</summary><div class="content">'+itemHtml(pick.it,pick.idx)+'</div></details>';}
function openAll(){document.querySelectorAll('details').forEach(d=>d.open=true)}
function closeAll(){document.querySelectorAll('details.item').forEach(d=>d.open=false)}
function resetMarks(){if(confirm('学習記録を消しますか')){Object.keys(localStorage).filter(k=>k.startsWith('riyouStudy:v3:'+PAGE_ID+':')).forEach(k=>localStorage.removeItem(k));render();}}
render();
</script><a class="floating-home" href="../index.html" aria-label="ホームへ戻る">⌂<span class="home-label">ホーム</span></a>
