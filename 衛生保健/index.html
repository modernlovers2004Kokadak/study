<script>
(function(){
const NS='riyouStudy:v3:';
function pageKey(){return location.pathname.replace(/^\//,'');}
window.studyKey=function(id){return NS+pageKey()+':'+id};
window.studyRead=function(id){try{return JSON.parse(localStorage.getItem(studyKey(id))||'{}')}catch(e){return {}}};
window.studySave=function(id, ok){const r=studyRead(id);r.answered=(r.answered||0)+1;r.correct=(r.correct||0)+(ok?1:0);r.wrong=(r.wrong||0)+(ok?0:1);r.last=Date.now();localStorage.setItem(studyKey(id),JSON.stringify(r));};
window.studyDone=function(id,done){const r=studyRead(id);r.done=!!done;localStorage.setItem(studyKey(id),JSON.stringify(r));};
window.studyBookmark=function(id,on){const r=studyRead(id);r.bookmark=!!on;localStorage.setItem(studyKey(id),JSON.stringify(r));};
window.studyStats=function(ids){let answered=0,correct=0,done=0,wrong=0;ids.forEach(id=>{const r=studyRead(id); if(r.answered){answered++; correct+=(r.correct?1:0); wrong+=(r.wrong?1:0)} if(r.done)done++;}); return {answered,correct,done,wrong,rate:answered?Math.round(correct/answered*100):0,total:ids.length};};
})();
</script>

const DATA=[{"title": "衛生・保健 完成版", "groups": [{"title": "第2章　衛生管理", "items": [{"title": "衛生管理の目的", "importance": "★★★★★", "original": "衛生管理は、理容業務に伴う感染や健康被害を防ぎ、安全で清潔な施術環境を保つために行う。", "points": ["感染予防", "健康被害の防止", "清潔な施術環境"], "question": "理容業務における衛生管理の考え方として、最も適切なものはどれか。", "choices": ["客、理容師、作業環境のいずれにも感染・健康被害が生じないよう、器具・布片・手指・作業環境を一体で管理する。", "刃物を扱う作業だけを管理すればよく、布片類や作業台は衛生管理の対象外である。", "見た目が清潔であれば、使用後器具と消毒済み器具を同じ容器に入れても差し支えない。", "営業効率を優先する場合は、客ごとの器具消毒を省略しても衛生管理上の問題はない。"], "answer": 0, "explain": "衛生管理は、器具だけでなく、手指、布片、作業環境、廃棄物まで含めて考える。ひっかけは『刃物だけ』『見た目が清潔なら可』『効率優先』という限定表現。"}, {"title": "清潔と不潔", "importance": "★★★★★", "original": "清潔とは、病原微生物や汚れによる危険が少ない状態をいう。不潔とは、感染や汚染の危険がある状態をいう。", "points": ["清潔と不潔の区分", "交差汚染防止", "使用前後の分離"], "question": "清潔な器具と使用済み器具の扱いとして、誤っているものはどれか。", "choices": ["使用済み器具は、後でまとめて消毒する予定であれば消毒済み器具と一時的に同じ容器へ戻してよい。", "消毒済み器具は、使用済み器具と区別して保管する。", "客に使用した器具は、次の客に使う前に洗浄・消毒する。", "清潔区域と不潔区域を意識して、交差汚染を防ぐ。"], "answer": 0, "explain": "使用済み器具を消毒済み器具と同じ容器に戻すと、清潔な器具まで汚染される。『一時的ならよい』がひっかけ。"}, {"title": "洗浄", "importance": "★★★★★", "original": "洗浄は、器具や手指などに付着した汚れや有機物を水、洗剤、ブラシ等で取り除く操作である。", "points": ["消毒前に実施", "有機物を除去", "物理的に汚れを落とす"], "question": "洗浄と消毒の関係として、最も適切なものはどれか。", "choices": ["血液や皮脂などの有機物が残ると消毒効果が低下しやすいため、消毒前に洗浄を行う。", "消毒薬を使えば有機物の有無にかかわらず効果は同じなので、洗浄は不要である。", "洗浄は消毒後に行うのが原則であり、消毒前に行うと効果が弱まる。", "水洗いした器具は消毒済みとみなせるため、薬液消毒や物理的消毒は不要である。"], "answer": 0, "explain": "消毒前に汚れを落とすのが基本。有機物が残ったままでは消毒効果が落ちる。"}, {"title": "消毒", "importance": "★★★★★", "original": "消毒は、病原微生物を感染の危険がない程度まで死滅又は除去することである。", "points": ["病原微生物を対象", "感染危険の低減", "滅菌との区別"], "question": "消毒の説明として正しいものはどれか。", "choices": ["病原微生物を感染の危険がない程度まで死滅又は除去する操作である。", "芽胞を含むすべての微生物を完全に除去する操作であり、滅菌と同じである。", "見た目の汚れを落とす操作であり、病原微生物への作用は問わない。", "薬液を使用する場合に限られ、熱や紫外線による方法は消毒に含まれない。"], "answer": 0, "explain": "消毒は滅菌とは異なり、感染の危険がない程度に病原微生物を減らすこと。"}, {"title": "滅菌", "importance": "★★★★★", "original": "滅菌は、芽胞を含むすべての微生物を死滅又は除去することである。", "points": ["すべての微生物", "芽胞を含む", "消毒より徹底"], "question": "滅菌と消毒の違いとして、最も適切なものはどれか。", "choices": ["滅菌は芽胞を含むすべての微生物を対象とし、消毒より徹底した概念である。", "滅菌は皮脂を落とす操作であり、消毒は汚れを落とす操作である。", "滅菌は病原微生物だけを対象とし、非病原性微生物は対象外である。", "滅菌は布片類にのみ用いる語で、器具には用いない。"], "answer": 0, "explain": "滅菌は『すべての微生物』が鍵。消毒との混同がよく出る。"}, {"title": "殺菌", "importance": "★★★★☆", "original": "殺菌は、微生物を死滅させることをいうが、死滅させる範囲や程度は用語だけでは決まらない。", "points": ["微生物を死滅", "範囲は方法次第", "消毒・滅菌と区別"], "question": "殺菌という用語の理解として正しいものはどれか。", "choices": ["微生物を死滅させることをいうが、どの範囲まで死滅させるかは方法や条件によって異なる。", "すべての微生物を完全に除去することを必ず意味する。", "汚れを水で洗い流すだけの操作をいう。", "手指にだけ使える用語で、器具には使えない。"], "answer": 0, "explain": "殺菌は『死滅させる』意味だが、滅菌と同義ではない。"}, {"title": "洗浄と消毒の順番", "importance": "★★★★★", "original": "器具は、使用後に汚れを落とし、洗浄した後、適切な方法で消毒し、清潔に保管する。", "points": ["洗浄が先", "消毒が後", "清潔保管"], "question": "使用後の器具管理として、正しい順序はどれか。", "choices": ["使用後器具を区分し、汚れを落として洗浄し、適切に消毒した後、清潔に保管する。", "使用後器具を清潔器具とまとめ、次の客の直前に水で濡らして使用する。", "消毒を先に行い、乾燥後に汚れを落とす。", "血液が付いた器具だけを洗浄し、その他の器具は客ごとの消毒を省く。"], "answer": 0, "explain": "基本は、区分、洗浄、消毒、清潔保管。順番の入れ替えがひっかけ。"}, {"title": "理容器具の消毒対象", "importance": "★★★★★", "original": "皮膚に接する器具は、客一人ごとに消毒した清潔なものを使用する。", "points": ["皮膚に接する器具", "客一人ごと", "消毒済み"], "question": "理容器具の消毒について、誤っているものはどれか。", "choices": ["同じ家族に続けて施術する場合は、皮膚に接する器具でも消毒せず共用できる。", "皮膚に接する器具は、客一人ごとに消毒済みのものを用いる。", "使用済み器具は消毒済み器具と区別する。", "血液が付着した疑いのある器具は、特に区分して扱う。"], "answer": 0, "explain": "家族であっても客ごとの衛生管理を省略する理由にはならない。"}, {"title": "布片類の交換", "importance": "★★★★★", "original": "皮膚に接する布片類は、客一人ごとに取り替え、使用済みのものは清潔なものと区別する。", "points": ["客一人ごと", "布片交換", "清潔・使用済みを区別"], "question": "タオルなどの布片類の扱いとして、最も適切なものはどれか。", "choices": ["皮膚に接する布片類は客一人ごとに取り替え、使用済みのものは清潔なものと区別する。", "乾いていれば、使用済み布片を次の客にそのまま使ってよい。", "首に直接触れない部分だけで使った布片は、使用済み扱いにしなくてよい。", "消毒済み器具と同じ容器に使用済み布片を入れると、管理が簡単で衛生的である。"], "answer": 0, "explain": "布片類も客ごとの交換と区別保管が基本。『乾いていればよい』は誤り。"}, {"title": "手指衛生", "importance": "★★★★★", "original": "作業前後及び客一人ごとに手指を洗浄し、必要に応じて消毒を行う。", "points": ["作業前後", "客一人ごと", "必要時の消毒"], "question": "手指衛生について、正しいものはどれか。", "choices": ["作業前後や客一人ごとの洗浄を基本とし、必要に応じて消毒を行う。", "手袋を着けていれば、客が替わっても手指衛生は不要である。", "手指消毒を行えば、目に見える汚れがあっても洗浄は不要である。", "一日の営業開始時に一度洗えば、その日は十分である。"], "answer": 0, "explain": "手袋は手指衛生の代わりにならない。客ごと、作業前後が基本。"}, {"title": "血液付着器具", "importance": "★★★★★", "original": "血液が付着した器具又はその疑いがある器具は、他の使用済み器具と区別し、適切に消毒する。", "points": ["血液付着", "区別保管", "厳重消毒"], "question": "血液が付着した疑いのある器具の扱いとして、最も適切なものはどれか。", "choices": ["他の器具と区別し、洗浄・消毒の手順を確実に行う。", "血液が乾燥していれば感染リスクはないため、通常の保管場所に戻す。", "少量であれば、拭き取るだけで次の客に使用できる。", "使用後器具と消毒済み器具を同じ容器に入れ、後でまとめて処理する。"], "answer": 0, "explain": "血液付着器具は感染リスクを考え、区分して処理する。"}, {"title": "消毒薬の濃度", "importance": "★★★★☆", "original": "消毒薬は、定められた濃度、作用時間、使用方法を守って使用する。", "points": ["濃度", "作用時間", "使用方法"], "question": "消毒薬の使用について、誤っているものはどれか。", "choices": ["濃度が高いほど常に安全で効果的なので、表示より濃くして使用する。", "定められた濃度を守る。", "必要な作用時間を確保する。", "対象物や使用方法に応じて適切な消毒薬を選ぶ。"], "answer": 0, "explain": "濃すぎる消毒薬は安全性や器具への影響の問題がある。濃度・時間・方法を守る。"}, {"title": "エタノール消毒", "importance": "★★★★☆", "original": "エタノールは、手指や器具の消毒に用いられるが、汚れや水分が多いと効果が低下する。", "points": ["エタノール", "汚れに弱い", "水分に注意"], "question": "エタノール消毒について、最も適切なものはどれか。", "choices": ["汚れや水分が多い状態では効果が低下しやすいため、必要に応じて洗浄・乾燥後に用いる。", "血液や皮脂が付着していても、噴霧すれば必ず十分な消毒効果が得られる。", "金属腐食を起こしやすいため、すべての金属器具には使用できない。", "紫外線が当たらない部分だけに効果を示す。"], "answer": 0, "explain": "エタノールは汚れや水分に弱い。洗浄との順番が重要。"}, {"title": "次亜塩素酸ナトリウム", "importance": "★★★★☆", "original": "次亜塩素酸ナトリウムは、器具や環境の消毒に用いられるが、金属腐食や有機物による効果低下に注意する。", "points": ["次亜塩素酸ナトリウム", "金属腐食", "有機物で効果低下"], "question": "次亜塩素酸ナトリウムの使用上の注意として、正しいものはどれか。", "choices": ["有機物で効果が低下しやすく、金属腐食にも注意する。", "皮脂や血液が多いほど効果が強くなる。", "金属器具に長時間使用しても腐食の心配はない。", "エタノールと同じ性質なので、濃度管理は不要である。"], "answer": 0, "explain": "有機物による効果低下と金属腐食が重要。"}, {"title": "紫外線消毒", "importance": "★★★☆☆", "original": "紫外線消毒は、紫外線が直接当たる部分に効果があり、陰になる部分には効果が届きにくい。", "points": ["直接照射", "陰は効きにくい", "保管管理"], "question": "紫外線消毒について、誤っているものはどれか。", "choices": ["器具が重なって陰になっていても、紫外線は内部まで均一に届く。", "紫外線が直接当たる部分に効果がある。", "陰になる部分は効果が届きにくい。", "照射面や配置に注意して使用する。"], "answer": 0, "explain": "紫外線は直進性があり、陰になる部分には届きにくい。"}, {"title": "廃棄物の処理", "importance": "★★★★☆", "original": "使用済みの刃物、血液が付着したもの、汚染された布片類は、安全に区別 const PAGE_ID="衛生保健/index.html";
window.studyKey=function(id){return 'riyouStudy:v3:'+PAGE_ID+':'+id};
const app=document.getElementById('app');
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function allItems(){let a=[]; if(Array.isArray(DATA)){DATA.forEach(ch=>(ch.groups||[]).forEach(g=>(g.items||[]).forEach(it=>a.push(it))))}else{(DATA.groups||[]).forEach(g=>(g.items||[]).forEach(it=>a.push(it)))} return a;}
function qid(it,idx){return 'q'+idx}
function render(){const ids=allItems().map((_,i)=>qid(_,i));app.innerHTML=`<section class="toolbar"><button onclick="openAll()">すべて開く</button><button onclick="closeAll()">すべて閉じる</button><button class="wrong-random" onclick="showWrongRandom()">間違えた問題をランダムに表示</button><button onclick="resetMarks()">学習記録を消す</button></section><div id="randomBox"></div>`+(Array.isArray(DATA)?DATA.map(ch=>`<details class="chapter" open><summary>${esc(ch.title)}</summary><div class="content">${(ch.groups||[]).map(g=>`<details class="group" open><summary>${esc(g.title)}<span class="count">${g.items.length}問</span></summary><div class="content">${g.items.map((it)=>itemHtml(it,allItems().indexOf(it))).join('')}</div></details>`).join('')}</div></details>`).join(''):(DATA.groups||[]).map(g=>`<details class="group" open><summary>${esc(g.title)}<span class="count">${g.items.length}問</span></summary><div class="content">${g.items.map((it)=>itemHtml(it,allItems().indexOf(it))).join('')}</div></details>`).join(''));bindChecks();}
function itemHtml(it,idx){const id=qid(it,idx), r=studyRead(id), checked=r.done?'checked':'', bm=r.bookmark?' on':'';const title=it.no?`${esc(it.no)}　${esc(it.topic)}`:esc(it.title);const lv=it.level||it.importance||''; const extra=it.original?`<section class="block law">${esc(it.original)}</section><section class="block point"><ul class="points">${(it.points||[]).map(p=>`<li>${esc(p)}</li>`).join('')}</ul></section>`:''; const exp=it.original?`<section class="block exp">答え：${it.answer+1}<br>${esc(it.explain)}</section>`:`<details class="answerbox"><summary>正解を表示</summary><div>正解：${it.answer+1}</div></details><details class="expbox"><summary>解説を表示</summary><div>${esc(it.explain)}<br><br>この問題で覚えること：${esc(it.memory||'')}<br>ひっかけポイント：${esc(it.trap||'')}</div></details>`;return `<details class="item" data-qid="${id}"><summary>${title}<span class="stars">${esc(lv)}</span></summary><div class="content">${extra}<section class="block quiz"><p class="question">${esc(it.question)}</p>${it.choices.map((c,i)=>`<button class="choice" onclick="answer(this,${i},${it.answer},'${id}')">${i+1}　${esc(c)}</button>`).join('')}</section>${exp}<button class="bookmark${bm}" data-bookmark="${id}" onclick="toggleBookmark(this,'${id}')">${r.bookmark?'★ ブックマーク済み':'☆ ブックマーク'}</button><label class="done"><input type="checkbox" data-id="${id}" ${checked}> 学習済み</label></div></details>`;}
function answer(btn,val,ans,id){const ok=val===ans;const q=btn.closest('.quiz');q.querySelectorAll('.choice').forEach((b,i)=>{b.classList.remove('correct','wrong','selected');if(i===ans)b.classList.add('correct');});btn.classList.add('selected');if(!ok)btn.classList.add('wrong');studySave(id,ok);const c=btn.closest('.content');const exp=c.querySelector('.exp');if(exp)exp.style.display='block';const ab=c.querySelector('.answerbox');if(ab)ab.open=true;const eb=c.querySelector('.expbox');if(eb)eb.open=true;updatePageStats();}
function toggleBookmark(btn,id){const on=!btn.classList.contains('on');btn.classList.toggle('on',on);btn.textContent=on?'★ ブックマーク済み':'☆ ブックマーク';studyBookmark(id,on);}
function bindChecks(){document.querySelectorAll('input[data-id]').forEach(ch=>{ch.onchange=()=>{studyDone(ch.dataset.id,ch.checked);updatePageStats();};});}
function updatePageStats(){}
function showWrongRandom(){const items=allItems().map((it,i)=>({it,idx:i,id:qid(it,i),r:studyRead(qid(it,i))})).filter(x=>(x.r.wrong||0)>0);const box=document.getElementById('randomBox');if(!items.length){box.innerHTML='<section class="wrong-empty">間違えた問題はまだありません。</section>';return;}const pick=items[Math.floor(Math.random()*items.length)];box.innerHTML='<details class="item" open><summary>間違えた問題からランダム表示</summary><div class="content">'+itemHtml(pick.it,pick.idx)+'</div></details>';}
function openAll(){document.querySelectorAll('details').forEach(d=>d.open=true)}
function closeAll(){document.querySelectorAll('details.item').forEach(d=>d.open=false)}
function resetMarks(){if(confirm('学習記録を消しますか')){Object.keys(localStorage).filter(k=>k.startsWith('riyouStudy:v3:'+PAGE_ID+':')).forEach(k=>localStorage.removeItem(k));render();}}
render();
